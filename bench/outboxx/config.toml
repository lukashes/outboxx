[metadata]
version = "v0"

[source]
type = "postgres"

[source.postgres]
host = "postgres"
port = 5432
database = "bench"
user = "postgres"
password_env = "POSTGRES_PASSWORD"
slot_name = "outboxx_benchmark_slot"
publication_name = "outboxx_benchmark_publication"

[sink]
type = "kafka"

[sink.kafka]
brokers = ["kafka:9092"]

[[streams]]
name = "benchmark-records"

[streams.source]
resource = "benchmark_records"
operations = ["insert", "update", "delete"]

[streams.flow]
format = "json"

[streams.sink]
destination = "outboxx.public.benchmark_records"
routing_key = "id"
