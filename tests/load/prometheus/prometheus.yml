global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: debezium-jmx
    static_configs:
      - targets:
          - debezium:9404

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
